      <h1>AI Word Decode</h1>

      <div class="thinking-box">

      <p class="question">

        <strong>GVGSVI</strong>

        Hint: Each letter is replaced by its opposite letter.

        A = Z, B = Y, C = X...

      <input type="text" id="answerInput" placeholder="Type your answer here" />

      <button class="main-btn" onclick="checkAnswer(3)">Submit Answer</button>

      <p id="resultMsg" class="result-msg"></p>
